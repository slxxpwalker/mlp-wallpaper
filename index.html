<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>MLP Farm Schedule Wallpaper</title>

<!--
  Auto-refresh ทุก 3600 วินาที (= 1 ชั่วโมง)
  ปรับเวลาได้ตามต้องการ:
    1800  = 30 นาที
    3600  = 1 ชั่วโมง  ← ค่าปัจจุบัน
    7200  = 2 ชั่วโมง
    21600 = 6 ชั่วโมง
    43200 = 12 ชั่วโมง
    86400 = 24 ชั่วโมง (วันละครั้ง)
-->
<meta http-equiv="refresh" content="3600">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #1a1625;
  }

  .frame-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #1a1625;
  }

  iframe {
    position: absolute;
    top: -60px;
    left: 0;
    width: 100vw;
    height: calc(100vh + 60px);
    border: none;
    background: #1a1625;
  }
</style>
</head>
<body>
  <div class="frame-container">
    <iframe
      src="https://script.google.com/macros/s/AKfycbxlaUIcJt4lqOb_x6-3bKwcLZvBixxP_6JYu3OjnLRUN1PUGiz7QAoxvy1T6Yze6yCA/exec"
      title="MLP Farm Schedule"
      scrolling="no">
    </iframe>
  </div>
</body>
</html>
